// STATE
const state = { actions: {}, total: companies.length, completed: 0 };

function tierColor(t) {
  return {S:'#FFD700',A:'#00ff88',B:'#3b82f6',C:'#6b7280'}[t]||'#6b7280';
}

function fmtRevenue(r) {
  if (!r) return null;
  if (r >= 1e9) return '$'+(r/1e9).toFixed(1)+'B';
  if (r >= 1e6) return '$'+(r/1e6).toFixed(0)+'M';
  return '$'+r.toLocaleString();
}

function fmtEmployees(e) {
  if (!e) return null;
  if (e >= 1000) return e.toLocaleString()+' emp';
  return e+' emp';
}

function truncate(s, n) {
  if (!s) return '';
  return s.length > n ? s.slice(0,n)+'…' : s;
}

function renderCards() {
  const container = document.getElementById('cards-container');
  container.innerHTML = '';
  companies.forEach((c, i) => {
    const hsUrl = `https://app.hubspot.com/contacts/242236444/record/0-2/${c.id}`;
    const sizeTag = c.revenue ? fmtRevenue(c.revenue) : (c.employees ? fmtEmployees(c.employees) : null);
    const industryLabel = c.industry ? c.industry.replace(/_/g,' ').replace(/AND/g,'&') : null;

    const div = document.createElement('div');
    div.className = 'card';
    div.id = `card-${i}`;
    div.innerHTML = `
      <div class="card-header">
        <div class="score-ring tier-${c.tier}">
          <span class="score-num">${c.score}</span>
          <span class="tier-ltr">${c.tier}</span>
        </div>
        <div class="card-meta">
          <div class="card-name"><a href="${hsUrl}" target="_blank">${c.name}</a></div>
          <div class="card-domain">${c.domain}</div>
          <div class="card-tags">
            ${industryLabel ? `<span class="tag tag-industry">${industryLabel}</span>` : ''}
            ${c.location ? `<span class="tag tag-location">📍 ${c.location}</span>` : ''}
            ${sizeTag ? `<span class="tag tag-size">${sizeTag}</span>` : ''}
            ${c.contacts > 0 ? `<span class="tag tag-contacts">👤 ${c.contacts} contact${c.contacts>1?'s':''}</span>` : ''}
          </div>
        </div>
      </div>

      <div class="btc-angle">⚡ ${c.btcAngle}</div>

      ${c.desc ? `<div class="card-desc">${truncate(c.desc, 160)}</div>` : ''}

      <div class="news-hook">
        <div class="news-hook-label">📰 News Hook</div>
        <div class="news-headline">${c.newsHeadline}</div>
        <div class="news-angle">"${c.newsAngle}"</div>
      </div>

      <div class="card-links">
        <a class="card-link hs-link" href="${hsUrl}" target="_blank">HubSpot →</a>
        ${c.linkedin ? `<a class="card-link" href="${c.linkedin}" target="_blank">LinkedIn</a>` : ''}
        ${c.website ? `<a class="card-link" href="${c.website}" target="_blank">Website</a>` : ''}
      </div>

      <div class="fit-section">
        <div class="fit-label">Product Fit</div>
        <div class="fit-bars">
          <div class="fit-bar-row fit-conf">
            <span class="fit-bar-name">Conference</span>
            <div class="fit-bar-track"><div class="fit-bar-fill" style="width:${c.fit.conf}%"></div></div>
            <span class="fit-bar-val">${c.fit.conf}</span>
          </div>
          <div class="fit-bar-row fit-media">
            <span class="fit-bar-name">Media (BM)</span>
            <div class="fit-bar-track"><div class="fit-bar-fill" style="width:${c.fit.media}%"></div></div>
            <span class="fit-bar-val">${c.fit.media}</span>
          </div>
          <div class="fit-bar-row fit-bmtv">
            <span class="fit-bar-name">BMTV</span>
            <div class="fit-bar-track"><div class="fit-bar-fill" style="width:${c.fit.bmtv}%"></div></div>
            <span class="fit-bar-val">${c.fit.bmtv}</span>
          </div>
          <div class="fit-bar-row fit-bfc">
            <span class="fit-bar-name">BFC</span>
            <div class="fit-bar-track"><div class="fit-bar-fill" style="width:${c.fit.bfc}%"></div></div>
            <span class="fit-bar-val">${c.fit.bfc}</span>
          </div>
        </div>
      </div>

      <div class="card-actions" id="actions-${i}">
        <button class="btn btn-add" onclick="doAction(${i},'add')">✅ Add to Outreach</button>
        <button class="btn btn-skip" onclick="doAction(${i},'skip')">Skip</button>
        <button class="btn btn-del" onclick="doAction(${i},'del')">🗑 Tag Delete</button>
      </div>
      <div class="action-badge" id="badge-${i}"></div>
    `;
    container.appendChild(div);
  });
}

function doAction(i, action) {
  if (state.actions[i]) return; // already actioned
  state.actions[i] = action;
  state.completed++;

  const card = document.getElementById(`card-${i}`);
  const actions = document.getElementById(`actions-${i}`);
  const badge = document.getElementById(`badge-${i}`);

  actions.style.display = 'none';
  badge.style.display = 'inline-block';

  if (action === 'add') {
    card.classList.add('actioned-add');
    badge.className = 'action-badge badge-add';
    badge.textContent = '✅ Added to Outreach';
  } else if (action === 'del') {
    card.classList.add('actioned-del');
    badge.className = 'action-badge badge-del';
    badge.textContent = '🗑 Tagged for Delete';
  } else {
    card.classList.add('actioned-skip');
    badge.className = 'action-badge badge-skip';
    badge.textContent = '⏭ Skipped';
  }

  updateCounters();
  updateProgress();

  // auto-scroll to next card
  const nextCard = document.getElementById(`card-${i+1}`);
  if (nextCard) {
    setTimeout(() => nextCard.scrollIntoView({behavior:'smooth', block:'center'}), 300);
  }

  if (state.completed >= state.total) {
    const fb = document.getElementById('finish-btn');
    fb.classList.add('enabled');
    fb.textContent = 'Finish Review →';
  }
}

function updateCounters() {
  let add=0, skip=0, del=0;
  Object.values(state.actions).forEach(a => {
    if(a==='add') add++;
    else if(a==='skip') skip++;
    else del++;
  });
  document.getElementById('cnt-add').textContent = add;
  document.getElementById('cnt-skip').textContent = skip;
  document.getElementById('cnt-del').textContent = del;
  document.getElementById('remaining-count').textContent = state.total - state.completed;
  document.getElementById('s-add').textContent = add;
  document.getElementById('s-skip').textContent = skip;
  document.getElementById('s-del').textContent = del;
}

function updateProgress() {
  const pct = (state.completed / state.total) * 100;
  document.getElementById('progress-bar').style.width = pct + '%';
}

function showSummary() {
  if (state.completed < state.total) return;
  const summary = document.getElementById('summary');
  summary.style.display = 'block';

  let lines = [`⚡ CRM Hygiene Review — ${TODAY}\n`];
  let addLines=[], delLines=[], skipLines=[];

  Object.entries(state.actions).forEach(([idx, action]) => {
    const c = companies[parseInt(idx)];
    const hsUrl = `https://app.hubspot.com/contacts/242236444/record/0-2/${c.id}`;
    const line = `• ${c.name} (${c.score} ${c.tier}) — ${hsUrl}`;
    if(action==='add') addLines.push(line);
    else if(action==='del') delLines.push(line);
    else skipLines.push(line);
  });

  if(addLines.length) lines.push('✅ ADDED TO OUTREACH:\n'+addLines.join('\n'));
  if(delLines.length) lines.push('\n🗑 TAGGED FOR DELETE:\n'+delLines.join('\n'));
  if(skipLines.length) lines.push('\n⏭ SKIPPED:\n'+skipLines.join('\n'));
  lines.push(`\nTotal Pool: ${TOTAL_POOL.toLocaleString()} untouched`);

  document.getElementById('summary-list').textContent = lines.join('\n');
  summary.scrollIntoView({behavior:'smooth'});
}

function copySummary() {
  const text = document.getElementById('summary-list').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.btn-copy');
    btn.textContent = '✅ Copied!';
    setTimeout(() => btn.textContent = '📋 Copy Summary', 2000);
  });
}

renderCards();
</script>
