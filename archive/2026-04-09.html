const state = new Array(20).fill(null);
let countYes=0,countDel=0,countDone=0;

function tierColor(t){return{S:'#f7931a',A:'#a78bfa',B:'#38bdf8',C:'#9ca3af'}[t]||'#9ca3af';}

function renderCards(){
  const container=document.getElementById('card-container');
  COMPANIES.forEach(c=>{
    const el=document.createElement('div');
    el.className='card';el.id=`card-${c.idx}`;el.dataset.idx=c.idx;
    el.innerHTML=`
      <div class="card-top">
        <div class="score-ring ${c.tier}"><span class="score-num">${c.score}</span><span class="score-tier">${c.tier}-TIER</span></div>
        <div class="card-info">
          <div class="company-name"><a href="https://app.hubspot.com/contacts/242236444/record/0-2/${c.id}" target="_blank">${c.name}</a></div>
          <div class="company-domain">${c.domain}</div>
          <div class="tags">
            <span class="tag tag-industry">${c.industry}</span>
            ${c.location?`<span class="tag tag-location">📍 ${c.location}</span>`:''}
            ${c.size?`<span class="tag tag-size">👥 ${c.size}</span>`:''}
          </div>
          <div class="btc-angle">${c.angle}</div>
          <div class="description">${c.desc}</div>
        </div>
      </div>
      <div class="news-hook">
        <div class="news-hook-label">📰 News Hook</div>
        <div class="news-headline">${c.headline}</div>
        <div class="news-angle">${c.hook}</div>
      </div>
      <div class="quick-links">
        <a class="quick-link" href="https://app.hubspot.com/contacts/242236444/record/0-2/${c.id}" target="_blank">🔗 HubSpot</a>
        ${c.linkedin?`<a class="quick-link" href="${c.linkedin}" target="_blank">💼 LinkedIn</a>`:''}
        ${c.website?`<a class="quick-link" href="${c.website}" target="_blank">🌐 Website</a>`:''}
      </div>
      <div class="fit-bars">
        <div class="fit-bar-row"><span class="fit-label">Conference</span><div class="fit-track"><div class="fit-fill fit-conf" style="width:${c.conf}%"></div></div><span class="fit-score">${c.conf}</span></div>
        <div class="fit-bar-row"><span class="fit-label">Media</span><div class="fit-track"><div class="fit-fill fit-media" style="width:${c.media}%"></div></div><span class="fit-score">${c.media}</span></div>
        <div class="fit-bar-row"><span class="fit-label">BMTV</span><div class="fit-track"><div class="fit-fill fit-bmtv" style="width:${c.bmtv}%"></div></div><span class="fit-score">${c.bmtv}</span></div>
        <div class="fit-bar-row"><span class="fit-label">BFC</span><div class="fit-track"><div class="fit-fill fit-bfc" style="width:${c.bfc}%"></div></div><span class="fit-score">${c.bfc}</span></div>
      </div>
      <div class="actions">
        <button class="btn btn-yes" onclick="doAction(${c.idx},'yes')">✅ Add to Outreach</button>
        <button class="btn btn-skip" onclick="doAction(${c.idx},'skip')">Skip</button>
        <button class="btn btn-del" onclick="doAction(${c.idx},'del')">🗑 Tag Delete</button>
        <span class="action-badge" id="badge-${c.idx}"></span>
      </div>`;
    container.appendChild(el);
  });
  const sp=document.createElement('div');
  sp.className='summary-panel';sp.id='summary-panel';
  sp.innerHTML=`<div class="summary-title">⚡ Review Complete — April 9, 2026</div><pre class="summary-content" id="summary-content"></pre><button class="copy-btn" onclick="copySummary()">📋 Copy Summary</button>`;
  container.appendChild(sp);
}

function doAction(idx,type){
  if(state[idx]!==null)return;
  state[idx]=type;
  const card=document.getElementById(`card-${idx}`);
  const badge=document.getElementById(`badge-${idx}`);
  card.querySelectorAll('.btn').forEach(b=>b.style.display='none');
  card.classList.add('actioned',type);
  if(type==='yes'){countYes++;badge.className='action-badge badge-yes';badge.textContent='✅ Added to Outreach';document.getElementById('count-yes').textContent=`✅ ${countYes}`;}
  else if(type==='skip'){badge.className='action-badge badge-skip';badge.textContent='⏭ Skipped';}
  else{countDel++;badge.className='action-badge badge-del';badge.textContent='🗑 Tagged for Delete';document.getElementById('count-del').textContent=`🗑 ${countDel}`;}
  badge.style.display='inline-flex';
  countDone++;updateProgress();
  const next=document.getElementById(`card-${idx+1}`);
  if(next)setTimeout(()=>next.scrollIntoView({behavior:'smooth',block:'start'}),300);
}

function updateProgress(){
  const pct=(countDone/20)*100;
  document.getElementById('progress-bar').style.width=pct+'%';
  document.getElementById('progress-label').textContent=`${countDone} / 20`;
  document.getElementById('bottom-remaining').textContent=`${countDone} / 20 reviewed`;
  if(countDone===20)document.getElementById('finish-btn').disabled=false;
}

function showSummary(){
  const yes=[],skip=[],del=[];
  state.forEach((s,i)=>{
    const c=COMPANIES[i];
    const line=`${c.name} (${c.tier}·${c.score})`;
    if(s==='yes')yes.push(line);else if(s==='skip')skip.push(line);else del.push(line);
  });
  const txt=`CRM HYGIENE REVIEW — April 9, 2026\nTotal: 20 of 2,564 untouched companies\n${'─'.repeat(42)}\nADDED TO OUTREACH (${yes.length}):\n${yes.length?yes.map(l=>`  • ${l}`).join('\n'):'  (none)'}\n\nSKIPPED (${skip.length}):\n${skip.length?skip.map(l=>`  • ${l}`).join('\n'):'  (none)'}\n\nTAGGED FOR DELETE (${del.length}):\n${del.length?del.map(l=>`  • ${l}`).join('\n'):'  (none)'}\n${'─'.repeat(42)}\nGenerated: BTC Media CRM Hygiene Bot · Apr 9 2026`;
  document.getElementById('summary-content').textContent=txt;
  document.getElementById('summary-panel').classList.add('visible');
  document.getElementById('summary-panel').scrollIntoView({behavior:'smooth'});
}

function copySummary(){
  navigator.clipboard.writeText(document.getElementById('summary-content').textContent).then(()=>{
    const b=document.querySelector('.copy-btn');b.textContent='✅ Copied!';setTimeout(()=>b.textContent='📋 Copy Summary',2000);
  });
}

document.addEventListener('DOMContentLoaded',renderCards);
</script>

<div class="bottom-bar">
  <div class="bottom-date">April 9, 2026 · 2,564 untouched companies remaining</div>
  <div class="bottom-remaining" id="bottom-remaining">0 / 20 reviewed</div>
  <button class="finish-btn" id="finish-btn" disabled onclick="showSummary()">Finish Review →</button>
</div>
