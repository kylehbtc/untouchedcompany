// State
const state = { reviewed: 0, added: 0, skipped: 0, deleted: 0, actions: {} };
const TOTAL_CARDS = companies.length;

function updateProgress() {
  const pct = Math.round((state.reviewed / TOTAL_CARDS) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label-left').textContent = state.reviewed + ' / ' + TOTAL_CARDS + ' reviewed';
  document.getElementById('progress-label-right').textContent = pct + '%';
  document.getElementById('cnt-add').textContent = '✅ ' + state.added;
  document.getElementById('cnt-skip').textContent = '→ ' + state.skipped;
  document.getElementById('cnt-delete').textContent = '🗑 ' + state.deleted;
  if (state.reviewed === TOTAL_CARDS) {
    document.getElementById('btn-finish').classList.add('active');
  }
}

function doAction(id, action) {
  if (state.actions[id]) return; // already acted
  state.actions[id] = action;
  state.reviewed++;
  if (action === 'add') state.added++;
  else if (action === 'skip') state.skipped++;
  else if (action === 'delete') state.deleted++;

  const card = document.getElementById('card-' + id);
  const btns = card.querySelector('.action-btns');
  const badge = card.querySelector('.action-badge.' + 'badge-' + action);

  card.classList.add(action === 'add' ? 'added' : action === 'skip' ? 'skipped' : 'deleted');
  btns.style.display = 'none';
  badge.style.display = 'inline-block';

  updateProgress();

  // Auto-scroll to next unreviewed card
  const nextIdx = companies.findIndex(c => !state.actions[c.id]);
  if (nextIdx !== -1) {
    const nextCard = document.getElementById('card-' + companies[nextIdx].id);
    if (nextCard) setTimeout(() => nextCard.scrollIntoView({ behavior: 'smooth', block: 'start' }), 200);
  }
}

function showSummary() {
  const panel = document.getElementById('summary-panel');
  panel.style.display = 'block';

  const addedCos = companies.filter(c => state.actions[c.id] === 'add').map(c => c.name);
  const deletedCos = companies.filter(c => state.actions[c.id] === 'delete').map(c => c.name);
  const skippedCos = companies.filter(c => state.actions[c.id] === 'skip').map(c => c.name);

  const summary = [
    '⚡ CRM HYGIENE SESSION — ' + TODAY,
    '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━',
    'Total Untouched Pool: ' + TOTAL.toLocaleString() + ' companies',
    'Reviewed Today: ' + state.reviewed + ' / ' + TOTAL_CARDS,
    '',
    '✅ Added to Outreach (' + state.added + '):',
    addedCos.length ? addedCos.map(n => '  • ' + n).join('\n') : '  (none)',
    '',
    '🗑 Tagged for Deletion (' + state.deleted + '):',
    deletedCos.length ? deletedCos.map(n => '  • ' + n).join('\n') : '  (none)',
    '',
    '→ Skipped (' + state.skipped + '):',
    skippedCos.length ? skippedCos.map(n => '  • ' + n).join('\n') : '  (none)',
    '',
    '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━',
    'Generated by CRM Hygiene Daily 20 · bitcoin2026.com'
  ].join('\n');

  document.getElementById('summary-text').textContent = summary;
  panel.scrollIntoView({ behavior: 'smooth' });
}

function copySummary() {
  const text = document.getElementById('summary-text').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.btn-copy');
    btn.textContent = '✓ Copied!';
    setTimeout(() => btn.textContent = 'Copy to Clipboard', 2000);
  });
}

function tierColor(t) {
  return { S: '#FFD700', A: '#00E676', B: '#f7931a', C: '#6060aa' }[t] || '#888';
}

function renderBar(label, value, cls) {
  return '<div class="fit-row ' + cls + '">' +
    '<span class="fit-label">' + label + '</span>' +
    '<div class="fit-bar-track"><div class="fit-bar-fill" style="width:' + value + '%"></div></div>' +
    '<span class="fit-score">' + value + '</span>' +
    '</div>';
}

function buildCard(c) {
  const hubspotUrl = HUBSPOT_BASE + c.id;
  const desc = c.description ? (c.description.length > 160 ? c.description.slice(0, 157) + '…' : c.description) : '';

  let tags = '';
  if (c.industry) tags += '<span class="tag tag-industry">' + c.industry + '</span>';
  if (c.location) tags += '<span class="tag tag-location">📍 ' + c.location + '</span>';
  if (c.employees) tags += '<span class="tag tag-size">👥 ' + c.employees + '</span>';
  if (c.revenue) tags += '<span class="tag tag-size">💰 ' + c.revenue + '</span>';

  let quickLinks = '<a class="quick-link" href="' + hubspotUrl + '" target="_blank">HubSpot</a>';
  if (c.linkedin) quickLinks += '<a class="quick-link" href="' + c.linkedin + '" target="_blank">LinkedIn</a>';
  if (c.website) quickLinks += '<a class="quick-link" href="' + c.website + '" target="_blank">Website</a>';

  return '<div class="company-card" id="card-' + c.id + '">' +
    '<div class="card-top">' +
      '<div class="score-ring tier-' + c.tier + '">' +
        '<span class="score-num">' + c.score + '</span>' +
        '<span class="score-tier">' + c.tier + '</span>' +
      '</div>' +
      '<div class="card-info">' +
        '<div class="card-name">' +
          '<a href="' + hubspotUrl + '" target="_blank">' + c.name + '</a>' +
        '</div>' +
        '<div class="card-domain">' + c.domain + '</div>' +
        (tags ? '<div class="card-tags">' + tags + '</div>' : '') +
        '<div class="btc-angle">' + c.btcAngle + '</div>' +
        (desc ? '<div class="card-desc">' + desc + '</div>' : '') +
      '</div>' +
    '</div>' +
    '<div class="news-hook">' +
      '<div class="news-hook-label">📰 News Hook</div>' +
      '<div class="news-headline">' + c.newsHeadline + '</div>' +
      '<div class="news-outreach"><strong>Angle:</strong> ' + c.newsAngle + '</div>' +
    '</div>' +
    '<div class="quick-links">' + quickLinks + '</div>' +
    '<div class="fit-bars">' +
      renderBar('CONF', c.fit.conf, 'fit-conf') +
      renderBar('MEDIA', c.fit.media, 'fit-media') +
      renderBar('BMTV', c.fit.bmtv, 'fit-bmtv') +
      renderBar('BFC', c.fit.bfc, 'fit-bfc') +
    '</div>' +
    '<div class="action-row">' +
      '<div class="action-btns" style="display:flex;gap:8px;flex-wrap:wrap;">' +
        '<button class="btn btn-add" onclick="doAction(\'' + c.id + '\',\'add\')">✅ Add to Outreach</button>' +
        '<button class="btn btn-skip" onclick="doAction(\'' + c.id + '\',\'skip\')">Skip</button>' +
        '<button class="btn btn-delete" onclick="doAction(\'' + c.id + '\',\'delete\')">🗑 Tag Delete</button>' +
      '</div>' +
      '<span class="action-badge badge-added" style="display:none">✅ Added to Outreach</span>' +
      '<span class="action-badge badge-skipped" style="display:none">→ Skipped</span>' +
      '<span class="action-badge badge-deleted" style="display:none">🗑 Tagged for Deletion</span>' +
    '</div>' +
  '</div>';
}

// Render all cards
const grid = document.getElementById('cards-grid');
grid.innerHTML = companies.map(buildCard).join('');
updateProgress();
</script>
