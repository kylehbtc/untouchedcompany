<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM Hygiene · Archive</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #080810; color: #e0e0e0; min-height: 100vh; }

.header { background: linear-gradient(135deg, #0d0d1a 0%, #1a0800 100%); border-bottom: 1px solid #2a1a00; padding: 18px 28px; display: flex; align-items: center; justify-content: space-between; }
.logo { font-size: 16px; font-weight: 800; color: #fff; }
.logo span { color: #f7931a; }
.header-sub { font-size: 12px; color: #555; margin-top: 3px; }
.today-btn { background: #f7931a; color: #000; border: none; border-radius: 8px; padding: 9px 18px; font-size: 13px; font-weight: 700; cursor: pointer; text-decoration: none; display: inline-block; }
.today-btn:hover { background: #ffb347; }

.wrap { max-width: 900px; margin: 0 auto; padding: 32px 20px; }

.month-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
.month-label { font-size: 20px; font-weight: 700; color: #fff; }
.nav-btn { background: #1a1a28; border: 1px solid #2a2a3e; color: #888; border-radius: 8px; padding: 8px 16px; font-size: 14px; cursor: pointer; transition: all 0.15s; }
.nav-btn:hover { border-color: #f7931a; color: #f7931a; }
.nav-btn:disabled { opacity: 0.3; cursor: default; }

.cal-grid { background: #0f0f1a; border: 1px solid #1e1e2e; border-radius: 14px; overflow: hidden; }
.cal-header { display: grid; grid-template-columns: repeat(7, 1fr); border-bottom: 1px solid #1e1e2e; }
.cal-header div { padding: 12px; text-align: center; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: #555; }
.cal-header div:first-child, .cal-header div:last-child { color: #444; }

.cal-body { display: grid; grid-template-columns: repeat(7, 1fr); }
.cal-day { min-height: 90px; padding: 10px; border-right: 1px solid #141420; border-bottom: 1px solid #141420; position: relative; transition: background 0.15s; }
.cal-day:nth-child(7n) { border-right: none; }
.cal-day.empty { background: #0a0a10; }
.cal-day.weekend { background: #0a0a0e; }
.cal-day.today { background: #0f0f1a; }
.cal-day.today .day-num { color: #f7931a; font-weight: 800; }
.cal-day.has-data { cursor: pointer; }
.cal-day.has-data:hover { background: #141420; }
.cal-day.future { opacity: 0.35; }

.day-num { font-size: 13px; color: #555; font-weight: 600; }
.cal-day.today .day-num { color: #f7931a; }
.cal-day.has-data .day-num { color: #ccc; }

.data-badge { margin-top: 8px; }
.data-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: #f7931a; margin-bottom: 6px; }
.data-label { font-size: 11px; color: #f7931a; font-weight: 600; line-height: 1.3; }
.data-sub { font-size: 10px; color: #666; margin-top: 2px; }
.view-link { display: inline-block; margin-top: 6px; font-size: 11px; color: #f7931a88; text-decoration: none; border: 1px solid #f7931a33; border-radius: 4px; padding: 2px 8px; transition: all 0.15s; }
.view-link:hover { background: #f7931a; color: #000; border-color: #f7931a; }

.no-data { font-size: 11px; color: #2a2a3e; margin-top: 8px; }

.stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 28px; }
.stat-card { background: #0f0f1a; border: 1px solid #1e1e2e; border-radius: 12px; padding: 16px 20px; }
.stat-num { font-size: 26px; font-weight: 800; color: #f7931a; }
.stat-label { font-size: 12px; color: #555; margin-top: 3px; }

.loading { text-align: center; padding: 60px; color: #444; font-size: 14px; }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="logo">⚡ CRM Hygiene · <span>Archive</span></div>
    <div class="header-sub">Daily 20 · Bitcoin 2026 Sponsorship Pipeline</div>
  </div>
  <a href="calendar.html" style="font-size:12px;color:#f7931a;text-decoration:none;border:1px solid #f7931a33;border-radius:6px;padding:6px 12px;">📅 Archive</a>
</div>

<div class="wrap">
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-num" id="total-sessions">—</div>
      <div class="stat-label">Review sessions completed</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="companies-reviewed">—</div>
      <div class="stat-label">Companies reviewed</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="streak">—</div>
      <div class="stat-label">Current streak (weekdays)</div>
    </div>
  </div>

  <div class="month-nav">
    <button class="nav-btn" id="prev-btn" onclick="changeMonth(-1)">← Prev</button>
    <div class="month-label" id="month-label">Loading...</div>
    <button class="nav-btn" id="next-btn" onclick="changeMonth(1)">Next →</button>
  </div>

  <div class="cal-grid" id="cal-grid">
    <div class="loading">Loading archive...</div>
  </div>
</div>

<script>
let availableDates = new Set();
let currentYear, currentMonth;

const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

async function loadArchive() {
  try {
    const res = await fetch('archive/index.json?t=' + Date.now());
    const data = await res.json();
    availableDates = new Set(data.dates || []);
  } catch(e) {
    availableDates = new Set(['2026-04-03']);
  }

  const now = new Date();
  currentYear = now.getFullYear();
  currentMonth = now.getMonth();
  renderCalendar();
  updateStats();
}

function updateStats() {
  const sessions = availableDates.size;
  document.getElementById('total-sessions').textContent = sessions;
  document.getElementById('companies-reviewed').textContent = (sessions * 20).toLocaleString();

  // Streak calc
  let streak = 0;
  const today = new Date();
  for (let i = 0; i < 30; i++) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    if (d.getDay() === 0 || d.getDay() === 6) continue; // skip weekends
    const dateStr = d.toISOString().split('T')[0];
    if (availableDates.has(dateStr)) streak++;
    else if (i > 0) break; // only break if not today (might not have run yet)
  }
  document.getElementById('streak').textContent = streak + (streak === 1 ? ' day' : ' days');
}

function changeMonth(dir) {
  currentMonth += dir;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  renderCalendar();
}

function renderCalendar() {
  document.getElementById('month-label').textContent = MONTHS[currentMonth] + ' ' + currentYear;

  const today = new Date();
  const todayStr = today.toISOString().split('T')[0];

  const firstDay = new Date(currentYear, currentMonth, 1).getDay();
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

  let html = '<div class="cal-header">';
  DAYS.forEach(d => html += `<div>${d}</div>`);
  html += '</div><div class="cal-body">';

  // Empty cells before first day
  for (let i = 0; i < firstDay; i++) html += '<div class="cal-day empty weekend"></div>';

  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow = new Date(currentYear, currentMonth, d).getDay();
    const isWeekend = dow === 0 || dow === 6;
    const isToday = dateStr === todayStr;
    const isFuture = new Date(dateStr) > today;
    const hasData = availableDates.has(dateStr);

    let cls = 'cal-day';
    if (isWeekend) cls += ' weekend';
    if (isToday) cls += ' today';
    if (isFuture) cls += ' future';
    if (hasData) cls += ' has-data';

    let inner = `<div class="day-num">${d}</div>`;
    if (hasData) {
      inner += `<div class="data-badge">
        <div class="data-dot"></div>
        <div class="data-label">20 reviewed</div>
        <a class="view-link" href="archive/${dateStr}.html">View →</a>
      </div>`;
    } else if (!isFuture && !isWeekend) {
      inner += `<div class="no-data">No session</div>`;
    }

    const onclick = hasData ? `onclick="window.location='archive/${dateStr}.html'"` : '';
    html += `<div class="${cls}" ${onclick}>${inner}</div>`;
  }

  // Fill remaining cells
  const totalCells = firstDay + daysInMonth;
  const remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
  for (let i = 0; i < remaining; i++) html += '<div class="cal-day empty weekend"></div>';

  html += '</div>';
  document.getElementById('cal-grid').innerHTML = html;

  // Disable prev if before April 2026 (first session)
  document.getElementById('prev-btn').disabled = (currentYear < 2026 || (currentYear === 2026 && currentMonth <= 3));
  document.getElementById('next-btn').disabled = (currentYear > today.getFullYear() || (currentYear === today.getFullYear() && currentMonth >= today.getMonth()));
}

loadArchive();
</script>
</body>
</html>
